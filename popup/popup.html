<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WordFizz Settings</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>WordFizz ✨</h1>
    <p>AI-powered writing assistant</p>
  </header>

  <main>
    <label for="api-key">Gemini API Key</label>
    <input
      type="password"
      id="api-key"
      placeholder="AIza..."
      autocomplete="off"
      spellcheck="false"
    />

    <button id="save-btn">Save</button>
    <p id="status" aria-live="polite"></p>

    <label for="model-select" style="margin-top:14px;">Model</label>
    <select id="model-select">
      <option value="gemini-2.5-flash">Gemini 2.5 Flash (recommended)</option>
      <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite (fastest)</option>
      <option value="gemini-2.5-pro">Gemini 2.5 Pro (best quality)</option>
      <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
      <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro Preview</option>
    </select>

    <div class="toggle-row" style="margin-top:14px;">
      <label for="dark-toggle" class="toggle-label">Dark toolbar</label>
      <label class="toggle-switch">
        <input type="checkbox" id="dark-toggle" />
        <span class="toggle-track"></span>
      </label>
    </div>

    <hr />

    <section class="actions-section">
      <div class="actions-header">
        <span class="section-label">Actions</span>
        <button id="add-action-btn" class="add-btn">+ Add</button>
      </div>
      <div id="actions-list"></div>
    </section>

    <hr />

    <section class="help">
      <h2>How to use</h2>
      <ol>
        <li>Select text in any input or textarea on any page</li>
        <li>A toolbar appears — pick an action</li>
        <li>Review the suggestion and click <strong>Apply</strong></li>
      </ol>
      <p>
        Get your API key at
        <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">
          aistudio.google.com/apikey
        </a>
      </p>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
